name: Deploy generated site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Check JavaScript syntax
        run: node --check script.js

      - name: Check Python syntax
        run: python -m py_compile scripts/*.py

      - name: Run source integrity checks
        run: python scripts/quality-check.py

      - name: Build static site
        run: python scripts/build_site.py --clean

      - name: Check generated routes, canonicals and local links
        run: python scripts/check_build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Verify deployed priority routes
        shell: bash
        env:
          SITE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          base="${SITE_URL%/}"
          routes=(
            "/"
            "/services/"
            "/services/research-integrity/"
            "/services/naac-evidence-readiness/"
            "/services/impact-evaluation/"
            "/services/research-methods/"
            "/tools/"
            "/contact/"
            "/privacy/"
            "/insights/how-to-identify-a-predatory-journal/"
          )
          for route in "${routes[@]}"; do
            url="${base}${route}"
            echo "Checking ${url}"
            body="$(curl --fail --silent --show-error --location \
              --retry 8 --retry-delay 5 --retry-all-errors \
              --max-time 30 "${url}")"
            test -n "${body}"
            grep -qi '<main' <<<"${body}"
            grep -q 'data-site-system="header"' <<<"${body}"
            grep -q 'data-site-system="footer"' <<<"${body}"
            canonical="https://gurjas.org${route}"
            grep -Fq "<link rel=\"canonical\" href=\"${canonical}\">" <<<"${body}"
            headers="$(curl --fail --silent --show-error --location \
              --retry 8 --retry-delay 5 --retry-all-errors \
              --max-time 30 --dump-header - --output /dev/null "${url}")"
            if grep -qi '^x-robots-tag:.*noindex' <<<"${headers}"; then
              echo "Unexpected noindex header on ${url}"
              exit 1
            fi
          done

          robots="$(curl --fail --silent --show-error --location \
            --retry 8 --retry-delay 5 --retry-all-errors \
            --max-time 30 "${base}/robots.txt")"
          grep -Fq 'User-agent: *' <<<"${robots}"
          grep -Fq 'Allow: /' <<<"${robots}"
          grep -Fq 'Sitemap: https://gurjas.org/sitemap.xml' <<<"${robots}"

          sitemap="$(curl --fail --silent --show-error --location \
            --retry 8 --retry-delay 5 --retry-all-errors \
            --max-time 30 "${base}/sitemap.xml")"
          grep -q '<urlset' <<<"${sitemap}"
          grep -q '<lastmod>' <<<"${sitemap}"
