name: Capture quality diagnostics

on:
  push:
    branches: [s1-truth-privacy-integrity]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: s1-truth-privacy-integrity
          fetch-depth: 0
      - name: Capture report
        run: |
          python scripts/quality-check.py > quality-report.txt 2>&1 || true
          rm .github/workflows/debug-quality.yml
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture quality diagnostics"
          git push origin HEAD:s1-truth-privacy-integrity
