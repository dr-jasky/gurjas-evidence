name: IndexNow ping

on:
  workflow_run:
    workflows: ["Deploy generated site to Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Submit sitemap URLs to IndexNow
        shell: bash
        run: |
          set -euo pipefail
          KEY="127d4f6734fd4c5b8f7308201fd3d836"
          HOST="gurjas.org"
          KEY_LOCATION="https://gurjas.org/${KEY}.txt"
          SITEMAP_URL="https://gurjas.org/sitemap.xml"
          # This participant endpoint accepts the deployed ownership key and
          # shares accepted notifications with the IndexNow network.
          INDEXNOW_ENDPOINT="https://search.seznam.cz/indexnow"

          for attempt in {1..24}; do
            public_key=$(curl --fail --silent --show-error --location \
              --max-time 20 "$KEY_LOCATION" || true)
            if [[ "$public_key" == "$KEY" ]]; then
              break
            fi
            if [[ "$attempt" -eq 24 ]]; then
              echo "IndexNow ownership key was not available after deployment"
              exit 1
            fi
            sleep 5
          done

          sitemap=$(curl --fail --silent --show-error --location \
            --retry 8 --retry-delay 5 --retry-all-errors \
            --max-time 30 "$SITEMAP_URL")
          urls=$(printf '%s' "$sitemap" | grep -o '<loc>[^<]*</loc>' | sed -e 's/<loc>//' -e 's#</loc>##')
          if [[ -z "$urls" ]]; then
            echo "Deployed sitemap contains no URLs"
            exit 1
          fi

          json_urls=$(printf '%s\n' "$urls" | jq -R . | jq -s .)

          payload=$(jq -n \
            --arg host "$HOST" \
            --arg key "$KEY" \
            --arg keyLocation "$KEY_LOCATION" \
            --argjson urlList "$json_urls" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

          http_code=$(curl --silent --show-error \
            --output /tmp/indexnow_response.txt --write-out '%{http_code}' \
            --request POST "$INDEXNOW_ENDPOINT" \
            --header "Content-Type: application/json; charset=utf-8" \
            --data "$payload")

          echo "IndexNow response code: $http_code"
          cat /tmp/indexnow_response.txt || true

          if [ "$http_code" != "200" ] && [ "$http_code" != "202" ]; then
            echo "IndexNow submission failed with HTTP $http_code"
            exit 1
          fi
