name: Site quality

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.13.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm

      - name: Set up Java for the Nu HTML Checker
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install quality dependencies
        run: pnpm install --frozen-lockfile

      - name: Check JavaScript syntax
        run: |
          node --check script.js
          node --check assets/tool-export.js
          node --check scripts/capture_visual_review.mjs
          node --check tests/accessibility/audit.mjs
          node --check tests/tools/journal-finder.spec.mjs
          node --check tests/tools/reference-checker.spec.mjs
          node --check tests/visual/compare.mjs

      - name: Check Python syntax
        run: python -m py_compile scripts/*.py

      - name: Run source integrity checks
        run: python scripts/quality-check.py

      - name: Build static site
        run: python scripts/build_site.py --clean

      - name: Validate generated HTML
        run: pnpm test:html

      - name: Check generated routes, canonicals and local links
        shell: bash
        run: |
          set -o pipefail
          python scripts/check_build.py 2>&1 | tee build-check.log

      - name: Upload generated site and diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gurjas-static-site
          path: |
            _site
            build-check.log
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  visual-review:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.13.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm

      - name: Install visual-test dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build static site
        run: python scripts/build_site.py --clean

      - name: Run tool fixtures, accessibility gate and capture responsive review
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CANDIDATE_URL: http://127.0.0.1:8000/
          VISUAL_APPROVED: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'visual-change-approved') }}
        run: |
          python -m http.server 8000 --bind 127.0.0.1 --directory _site > visual-server.log 2>&1 &
          candidate_pid=$!
          base_pid=""
          cleanup() {
            kill "$candidate_pid" 2>/dev/null || true
            if [[ -n "$base_pid" ]]; then
              kill "$base_pid" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          curl --fail --silent --show-error \
            --retry 20 --retry-delay 1 --retry-all-errors \
            http://127.0.0.1:8000/ > /dev/null

          CANDIDATE_URL="http://127.0.0.1:8000/" pnpm test:tools

          A11Y_BASE_URL="$CANDIDATE_URL" \
            A11Y_REPORT_DIR="accessibility-review" \
            pnpm test:a11y

          baseline_url="https://gurjas.org/"
          if [[ -n "$BASE_SHA" ]]; then
            git worktree add --detach /tmp/gurjas-base "$BASE_SHA"
            python /tmp/gurjas-base/scripts/build_site.py --clean
            python -m http.server 8001 --bind 127.0.0.1 --directory /tmp/gurjas-base/_site > baseline-server.log 2>&1 &
            base_pid=$!
            curl --fail --silent --show-error \
              --retry 20 --retry-delay 1 --retry-all-errors \
              http://127.0.0.1:8001/ > /dev/null
            baseline_url="http://127.0.0.1:8001/"
          fi

          node scripts/capture_visual_review.mjs
          BASELINE_URL="$baseline_url" pnpm test:visual

      - name: Upload visual and accessibility review
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gurjas-visual-review
          path: |
            accessibility-review
            visual-review
            tests/visual/artifacts
            baseline-server.log
            visual-server.log
          if-no-files-found: error
          retention-days: 14
