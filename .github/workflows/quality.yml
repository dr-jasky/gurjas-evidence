name: Site quality

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: session3-quality-migration
  cancel-in-progress: false

jobs:
  session3-migrate:
    if: github.event.pull_request.head.ref == 's3-priority-offers' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out Session 3 branch
        uses: actions/checkout@v4
        with:
          ref: s3-priority-offers
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply deterministic routing migration
        run: python scripts/session3_migrate.py

      - name: Restore permanent workflow and remove migration files
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/quality.yml > .github/workflows/quality.yml
          rm -f .github/workflows/session3-migrate.yml
          rm -f scripts/session3_migrate.py

      - name: Validate complete source and generated site
        run: |
          node --check script.js
          python -m py_compile scripts/*.py
          python scripts/quality-check.py
          python scripts/build_site.py --clean
          python scripts/check_build.py

      - name: Commit migrated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply Session 3 priority offer routing"
          git push origin HEAD:s3-priority-offers
