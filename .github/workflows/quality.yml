name: Site quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Set up Java for the Nu HTML Checker
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install quality dependencies
        run: pnpm install --frozen-lockfile

      - name: Check JavaScript syntax
        run: node --check script.js

      - name: Check Python syntax
        run: python -m py_compile scripts/*.py

      - name: Run source integrity checks
        run: python scripts/quality-check.py

      - name: Build static site
        run: python scripts/build_site.py --clean

      - name: Validate generated HTML
        run: pnpm test:html

      - name: Check generated routes, canonicals and local links
        shell: bash
        run: |
          set -o pipefail
          python scripts/check_build.py 2>&1 | tee build-check.log

      - name: Upload generated site and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gurjas-static-site
          path: |
            _site
            build-check.log
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  visual-review:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install visual-test dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build static site
        run: python scripts/build_site.py --clean

      - name: Capture responsive review and compare with production
        shell: bash
        env:
          CANDIDATE_URL: http://127.0.0.1:8000/
          PRODUCTION_URL: https://gurjas.org/
          VISUAL_APPROVED: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'visual-change-approved') }}
        run: |
          python -m http.server 8000 --bind 127.0.0.1 --directory _site > visual-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT

          curl --fail --silent --show-error \
            --retry 20 --retry-delay 1 --retry-all-errors \
            http://127.0.0.1:8000/ > /dev/null

          node scripts/capture_visual_review.mjs
          pnpm test:visual

      - name: Upload visual review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gurjas-visual-review
          path: |
            visual-review
            tests/visual/artifacts
            visual-server.log
          if-no-files-found: error
          retention-days: 14
