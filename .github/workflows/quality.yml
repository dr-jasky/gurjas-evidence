name: Site quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check JavaScript syntax
        run: node --check script.js

      - name: Check Python syntax
        run: python -m py_compile scripts/*.py

      - name: Run source integrity checks
        run: python scripts/quality-check.py

      - name: Build static site
        run: python scripts/build_site.py --clean

      - name: Check generated routes, canonicals and local links
        shell: bash
        run: |
          set -o pipefail
          python scripts/check_build.py 2>&1 | tee build-check.log

      - name: Upload generated site and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gurjas-static-site
          path: |
            _site
            build-check.log
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  visual-review:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build static site
        run: python scripts/build_site.py --clean

      - name: Install screenshot browser
        run: |
          npm install --no-save --no-package-lock playwright@1.61.1
          npx playwright install --with-deps chromium

      - name: Capture responsive visual review
        shell: bash
        run: |
          python -m http.server 8000 --bind 127.0.0.1 --directory _site > /tmp/gurjas-review-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT

          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8000/ > /dev/null; then
              break
            fi
            sleep 1
          done

          curl --fail --silent http://127.0.0.1:8000/ > /dev/null
          node scripts/capture_visual_review.mjs

      - name: Upload responsive screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gurjas-visual-review
          path: visual-review
          if-no-files-found: error
          retention-days: 7
