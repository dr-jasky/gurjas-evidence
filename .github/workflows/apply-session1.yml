name: Apply Session 1 trust repair

on:
  push:
    branches: [s1-truth-privacy-integrity]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: s1-truth-privacy-integrity
          fetch-depth: 0

      - name: Apply deterministic migration
        run: python scripts/apply-session1.py

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Apply Session 1 truth, privacy and integrity repair"
          git push origin HEAD:s1-truth-privacy-integrity
