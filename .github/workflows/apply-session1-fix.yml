name: Apply Journal Finder privacy repair

on:
  push:
    branches: [s1-truth-privacy-integrity]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: s1-truth-privacy-integrity
          fetch-depth: 0

      - name: Apply repair
        run: python scripts/fix-journal-finder.py

      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete Journal Finder privacy controls"
          git push origin HEAD:s1-truth-privacy-integrity
