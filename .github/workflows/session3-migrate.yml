name: Apply Session 3 migration

on:
  push:
    branches: [s3-priority-offers]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: session3-migration
  cancel-in-progress: false

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: s3-priority-offers
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply deterministic migration
        run: python scripts/session3_migrate.py

      - name: Remove one-time migration files
        run: |
          rm scripts/session3_migrate.py
          rm .github/workflows/session3-migrate.yml

      - name: Validate source and generated site
        run: |
          node --check script.js
          python -m py_compile scripts/*.py
          python scripts/quality-check.py
          python scripts/build_site.py --clean
          python scripts/check_build.py

      - name: Commit migrated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply Session 3 priority offer routing"
          git push origin HEAD:s3-priority-offers
